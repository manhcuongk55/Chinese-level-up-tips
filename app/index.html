<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>levAIup — Level Up Your Languages with AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="particles"></div>
  <div id="confetti-container"></div>
  <div class="xp-popup" id="xp-popup"></div>

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <div class="logo">lev<span class="logo-ai">AI</span>up</div>
    <div class="tabs">
      <button class="tab active" id="tab-feed"    onclick="switchTab('feed')">Feed</button>
      <button class="tab"        id="tab-quiz"    onclick="switchTab('quiz')">Quiz</button>
      <button class="tab"        id="tab-profile" onclick="switchTab('profile')">Profile</button>
    </div>
    <div class="lang-toggle" id="lang-toggle" onclick="cycleLang()">
      <span id="lang-from-flag">🇨🇳</span>
      <span class="lang-arrow">→</span>
      <span id="lang-to-flag">🇬🇧</span>
    </div>
  </div>

  <!-- XP BAR -->
  <div class="xp-bar-wrap">
    <div class="xp-bar-inner">
      <span class="xp-level-label" id="xp-level-label">Lv.1 · Beginner</span>
      <div class="xp-track"><div class="xp-fill" id="xp-fill"></div></div>
      <span class="xp-val" id="xp-val">0 / 100 XP</span>
    </div>
    <div class="streak-pill">🔥<span id="streak-count">1</span></div>
  </div>

  <!-- ===== FEED VIEW ===== -->
  <div id="view-feed" class="view active">
    <!-- Language label -->
    <div class="lang-label-bar">
      <span id="studying-label">📚 Studying: <b id="lang-name">Chinese (中文)</b></span>
      <span class="flip-dir" id="flip-dir">ZH → EN</span>
    </div>

    <!-- Desktop nav arrows -->
    <button class="nav-arrow up" onclick="goPrev()" title="↑ Previous">↑</button>
    <button class="nav-arrow dn" onclick="goNext()" title="↓ Next">↓</button>

    <div class="card-stack" id="card-stack"></div>

    <!-- Side actions -->
    <div class="side-actions">
      <button class="action-btn" onclick="toggleLike()">
        <div class="action-icon" id="like-icon">🤍</div>
        <div class="action-label" id="like-count">0</div>
      </button>
      <button class="action-btn" onclick="toggleSave()">
        <div class="action-icon" id="save-icon">🔖</div>
        <div class="action-label">Save</div>
      </button>
      <button class="action-btn" onclick="speakCurrent()">
        <div class="action-icon">🔊</div>
        <div class="action-label">Listen</div>
      </button>
      <button class="action-btn" onclick="shareCard()">
        <div class="action-icon">↗️</div>
        <div class="action-label">Share</div>
      </button>
    </div>

    <!-- Desktop hint -->
    <div class="desktop-hint">🖱️ Scroll · Drag · ↑↓ Keys</div>

    <!-- Progress -->
    <div class="card-progress" id="card-progress">1 / 50</div>
  </div>

  <!-- ===== QUIZ VIEW ===== -->
  <div id="view-quiz" class="view">
    <div class="quiz-shell">
      <!-- Language selector for quiz -->
      <div class="quiz-lang-row">
        <button class="lang-pill active" id="qlang-zh" onclick="setQuizLang('zh')">🇨🇳 Chinese</button>
        <button class="lang-pill" id="qlang-en" onclick="setQuizLang('en')">🇬🇧 English</button>
        <button class="lang-pill" id="qlang-mix" onclick="setQuizLang('mix')">🌍 Mixed</button>
      </div>
      <div class="quiz-stats-row">
        <div class="qstat"><div class="qstat-num" id="qs-score">0</div><div class="qstat-lbl">Score</div></div>
        <div class="qstat"><div class="qstat-num yellow" id="qs-streak">0🔥</div><div class="qstat-lbl">Streak</div></div>
        <div class="qstat"><div class="qstat-num purple" id="qs-xp">0⭐</div><div class="qstat-lbl">XP</div></div>
      </div>
      <div class="quiz-card" id="quiz-card">
        <div class="quiz-q" id="quiz-q">—</div>
        <div class="quiz-hint" id="quiz-hint"></div>
        <div class="quiz-opts" id="quiz-opts"></div>
      </div>
      <div class="quiz-prog">Q <span id="qnum">1</span> / <span id="qtotal">10</span></div>
    </div>
  </div>

  <!-- ===== PROFILE / LEVEL VIEW ===== -->
  <div id="view-profile" class="view">
    <div class="profile-shell">
      <!-- Level card -->
      <div class="level-card">
        <div class="level-badge" id="level-badge">⚔️</div>
        <div class="level-name" id="level-name">Beginner</div>
        <div class="level-num" id="level-num">Level 1</div>
        <div class="level-xp-row">
          <div class="level-track"><div class="level-fill" id="level-fill"></div></div>
          <div class="level-xp-txt" id="level-xp-txt">0 / 100 XP</div>
        </div>
      </div>

      <!-- Languages active -->
      <div class="section-title">🌍 Languages</div>
      <div class="lang-grid" id="lang-grid"></div>

      <!-- Daily Missions -->
      <div class="section-title">🎯 Daily Missions</div>
      <div class="missions-list" id="missions-list"></div>

      <!-- Stats -->
      <div class="section-title">📊 Stats</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num" id="st-cards">0</div><div class="stat-lbl">Cards Studied</div></div>
        <div class="stat-box"><div class="stat-num" id="st-streak">1</div><div class="stat-lbl">Day Streak</div></div>
        <div class="stat-box"><div class="stat-num" id="st-xp">0</div><div class="stat-lbl">Total XP</div></div>
        <div class="stat-box"><div class="stat-num" id="st-saved">0</div><div class="stat-lbl">Saved</div></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-feed" onclick="switchTab('feed')">
      <div class="nav-icon">📱</div><div class="nav-label">Feed</div>
    </button>
    <button class="nav-btn" id="nav-quiz" onclick="switchTab('quiz')">
      <div class="nav-icon">🎯</div><div class="nav-label">Quiz</div>
    </button>
    <button class="nav-btn" id="nav-profile" onclick="switchTab('profile')">
      <div class="nav-icon">⚡</div><div class="nav-label">Level Up</div>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
